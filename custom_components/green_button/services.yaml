delete_statistics:
  name: Delete Green Button Statistics
  description: Delete statistics
  fields:
    statistic_id:
      name: Statistic ID
      description: The ID of the statistics to clear.
      required: true
      example: "sensor.home_gas_consumption"
      selector:
        text:

import_espi_xml:
  name: Import Green Button ESPI XML
  description: Import usage data from an XML file or XML content in the ESPI atom format. Provide either xml_file_path OR xml, not both.
  fields:
    xml_file_path:
      name: XML File Path
      description: "Path to the XML file to import (e.g., /share/myfile.xml). Leave empty if providing XML content directly."
      required: false
      selector:
        text:
    xml:
      name: XML Content
      description: "ESPI XML content to import directly. Leave empty if providing a file path."
      required: false
      selector:
        text:
          multiline: true

log_statistics:
  name: Log Statistics
  description: Log Statistics
  target:
    entity:
      domain: number
      integration: green_button
  fields:
    start:
      name: Start
      description: Start
      required: true
      selector:
        datetime:
    end:
      name: End
      description: End
      required: true
      selector:
        datetime:

refresh_eversource:
  name: Refresh Eversource Data
  description: >-
    Trigger an immediate refresh of all Eversource usage data.
    This performs a fresh login and fetches the latest usage history
    for every configured Eversource entry.

reset:
  name: Reset
  description: Reset
  target:
    entity:
      domain: number
      integration: green_button
